services:

  # ── PostgreSQL Database ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: shamba_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB Vector Database ──────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: shamba_chromadb
    ports:
      - "8001:8000"
    volumes:
      - ./vectordb/chroma_data:/chroma/chroma

  # ── Python Backend ────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: shamba_backend
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - ./Data:/app/data
      - ./vectordb/chroma_data:/app/chroma_data
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - POSTGRES_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started

  # ── React Frontend ────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: shamba_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: